<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Claims</title>

<style>
body { font-family: Arial; background:#f4f6f9; }
.container { max-width:375px; margin:auto; padding:20px; }

.card {
  background:white;
  padding:15px;
  margin-top:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform: scale(1.02);
}

/* DETAILS HIDDEN BY DEFAULT */
.details {
  display:none;
  margin-top:10px;
  font-size:14px;
  border-top:1px solid #eee;
  padding-top:10px;
}

/* SHOW DETAILS ON HOVER */
.card:hover .details {
  display:block;
}

.title { font-weight:bold; }
.info { color:gray; margin-top:5px; }

.status { margin-top:8px; font-weight:bold; }
.pending { color:orange; }
.approved { color:green; }
.rejected { color:red; }

.comment {
  margin-top:8px;
  background:#ffe6e6;
  padding:8px;
  border-radius:8px;
  color:#b00020;
}
</style>

</head>

<body>

<div class="container">
<h2>My Claims</h2>
<div id="claimsList"></div>
</div>

<script>
async function loadClaims() {

  const res = await fetch("http://127.0.0.1:8000/claims");
  const data = await res.json();

  const container = document.getElementById("claimsList");
  container.innerHTML = "";

  data.forEach(claim => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${claim.title}</div>
      <div class="info">₹${claim.amount} • ${claim.category}</div>
      <div class="status ${claim.status}">
        ${claim.status.toUpperCase()}
      </div>

      <div class="details">
        <div><b>Date:</b> ${claim.date}</div>
        <div><b>Description:</b> ${claim.description || "-"}</div>

        ${claim.status === "rejected" && claim.comment ? `
          <div class="comment">
            <b>Manager Comment:</b> ${claim.comment}
          </div>
        ` : ""}
      </div>
    `;

    container.appendChild(div);
  });
}

loadClaims();
</script>

</body>
</html>
